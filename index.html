<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бюджет Пърт</title>
  <meta name="description" content="Сравни разходите си в България и Пърт, Австралия">
  <meta name="theme-color" content="#0252a3">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── INPUT SCREEN ─────────────────────────────────────── -->
  <div id="screen-input" class="screen active">
    <header class="app-header">
      <div class="header-logo">
        <span class="logo-mark">БП</span>
      </div>
      <div>
        <h1>Бюджет Пърт <span id="app-version" class="app-version"></span></h1>
        <p class="subtitle">Сравни разходите си в България и Пърт</p>
      </div>
    </header>

    <main class="input-main" id="input-main">
      <!-- rendered by renderInputScreen() in app.js -->
    </main>
  </div>

  <!-- ── RESULTS SCREEN ────────────────────────────────────── -->
  <div id="screen-results" class="screen">
    <header class="results-header no-print">
      <button class="btn-back" id="btn-back">← Промени</button>
      <span class="results-title">Бюджет Пърт</span>
      <button class="btn-print" id="btn-print">🖨 PDF</button>
    </header>

    <main id="results-main" class="results-main">
      <!-- Rendered by app.js -->
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
