<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1A4E6E">
  <meta name="description" content="Изчисли разходите за преместване в Пърт, Австралия — визи, жилище и месечни разходи.">
  <title>Perth Budget Calculator</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Wizard -->
  <div id="wizard-container">
    <div id="wizard-top">
      <button id="back-btn" class="back-btn" aria-label="Назад" style="visibility:hidden">←</button>
      <div id="progress-bar" role="progressbar" aria-label="Напредък">
        <div id="progress-fill"></div>
      </div>
    </div>
    <div id="card-viewport">
      <div id="card-current" class="card"></div>
    </div>
  </div>

  <!-- Summary -->
  <div id="summary-screen" class="hidden" role="main"></div>

  <!-- GoatCounter -->
  <script>
    window.goatcounter = { path: function(p) { return location.host + p; } }
  </script>
  <script data-goatcounter="https://emigratetoaustralia.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <script src="app.js"></script>
</body>
</html>
