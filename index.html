<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FF8000">
  <meta name="description" content="Изчисли разходите за преместване в Пърт, Австралия — визи, жилище и месечни разходи.">
  <title>Perth Budget Calculator</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/EA.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      var t = localStorage.getItem('ea-theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <!-- Top bar (outside wizard-container so it spans full viewport width) -->
  <div id="wizard-top">
    <button id="back-btn" class="back-btn" aria-label="Назад" style="visibility:hidden">←</button>
    <img src="icons/EA.png" alt="EA" class="top-bar-logo">
    <div id="top-bar-text">
      <span id="app-title">Perth Budget</span>
      <span id="app-subtitle">Емигрирай в Австралия</span>
    </div>
    <button id="theme-toggle" class="theme-toggle" aria-label="Превключи тема"></button>
  </div>

  <!-- Progress bar below the orange bar, on page background -->
  <div id="progress-bar" role="progressbar" aria-label="Напредък">
    <div id="progress-fill"></div>
  </div>

  <!-- Wizard -->
  <div id="wizard-container">
    <div id="card-viewport">
      <div id="card-current" class="card"></div>
    </div>
  </div>

  <!-- Summary -->
  <div id="summary-screen" class="hidden" role="main"></div>

  <!-- GoatCounter -->
  <script>
    window.goatcounter = { path: function(p) { return location.host + p; } }
  </script>
  <script data-goatcounter="https://emigratetoaustralia.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <script src="app.js"></script>
</body>
</html>
